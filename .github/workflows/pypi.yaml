name: pyping release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        submodules: recursive

    - name: Build wheels
      uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
      env:
        CIBW_SKIP: cp36-* *-win32
        CIBW_BEFORE_BUILD_WINDOWS: "choco install mingw -y"

    - uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: ./wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        submodules: recursive

    - name: Build sdist
      run: |
        python -m pip install --upgrade build setuptools
        python -m build --sdist .

    - uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz

  test-sdist:
    name: Test sdist on ${{ matrix.os }}
    needs: build-sdist
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.12'

    - name: Install MinGW (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install mingw -y
        echo "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH

    - uses: actions/download-artifact@v4
      with:
        name: sdist
        path: dist

    - name: Install sdist and test
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install dist/*.tar.gz --no-binary :all: pytest
        pytest tests/python

  upload-pypi:
    needs: [build-wheels, build-sdist, test-sdist]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: twine upload
      run: |
        python -m pip install --upgrade twine
        find artifacts -type f \( -name '*.whl' -o -name '*.tar.gz' \) | xargs twine upload --verbose
      env:
        TWINE_USERNAME: "__token__"
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
